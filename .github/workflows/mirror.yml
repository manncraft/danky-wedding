name: Mirror to personal repo

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch to mirror
        run: |
          git push --force \
            "https://oauth2:${{ secrets.SYNC_TOKEN }}@github.com/dandamann/danky-wedding-sync.git" \
            "refs/heads/${{ github.ref_name }}:refs/heads/${{ github.ref_name }}"
